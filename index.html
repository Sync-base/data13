<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENKEU PORTALDATA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    /* Latar belakang disesuaikan dengan tema portal */
    background-color: #fefce8; 
    font-family: 'Inter', sans-serif;
}

.app-header {
    height: 45px; 
    /* Ubah background agar tidak biru gelap */
    background-color: #f8f1de; 
    border-bottom: 1px solid #e5dcc3;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; box-sizing: border-box;
}

.brand { 
    display: flex; align-items: center; gap: 10px; 
    /* UBAH WARNA INI MENJADI COKELAT */
    color: #92400e; 
    font-weight: 800; font-size: 13px; text-transform: uppercase; 
    letter-spacing: 0.05em;
}

.status-badge { 
    display: flex; align-items: center; gap: 8px; 
    background-color: #fefce8; 
    padding: 4px 12px; border-radius: 20px; 
    color: #92400e; font-size: 11px; 
    border: 1px solid #92400e; /* Border cokelat */
}

.status-dot { 
    width: 7px; height: 7px; 
    /* Mengubah warna menjadi hijau */
    background-color: #10b981; 
    border-radius: 50%; 
    /* Memberikan efek cahaya (glow) hijau */
    box-shadow: 0 0 8px #10b981; 
    animation: pulse 2s infinite; 
}
.iframe-container { 
    position: absolute; left: 0; bottom: 0; right: 0; width: 100%; top: 45px; 
    height: calc(100% - 45px); border: none; z-index: 9999; 
    background-color: #fefce8; 
}

iframe { 
    width: 100%; height: 100%; border: none; display: block; 
}

@keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}
    </style>
</head>
<body>

  <header class="app-header">
    <div class="brand">
      <i class="bi bi-shield-check"></i>
      <span>MANAJEMEN DATA & SISTEM INFORMASI</span>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div> Secure Google Cloud Connection
    </div>
  </header>

  <div class="iframe-container">
    <iframe 
        src="https://script.google.com/macros/s/AKfycbyq2cXU9U8XNC0tyzL_7sadIThfqaGcpY863CAmNY7d0kucocmsmKXNx9y1s5keEFAp/exec" 
        id="Renkeu-frame"
        name="Renkeu-frame"
        allow="camera; geolocation; microphone; clipboard-write; javascript"
        title="Renkeu-Portaldata">
    </iframe>
  </div>

</body>
</html>
